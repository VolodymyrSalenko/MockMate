services:
  - type: web
    name: mockmate-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mockmate-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: mokemate.app@gmail.com
      - key: API_BASE_URL
        value: https://mockmate-backend.onrender.com
      - key: FRONTEND_URL
        value: https://mockmate-frontend.onrender.com

  - type: web
    name: mockmate-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        value: https://mockmate-backend.onrender.com
      - key: VITE_ELEVENLABS_API_KEY
        sync: false

databases:
  - name: mockmate-db
    databaseName: mockmate
    user: mockmate
    plan: free
